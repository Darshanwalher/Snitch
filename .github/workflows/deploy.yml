name: CD — Test & Deploy

on:
  push:
    branches: [main]    # only runs when code lands on main

jobs:

  # ── Job 1: Run tests ─────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install backend dependencies
        working-directory: Backend
        run: npm ci

      - name: Run tests
        working-directory: Backend
        env:
          NODE_ENV: test
          JWT_SECRET_KEY: test-secret-key-for-ci
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
          IMAGEKIT_PRIVATE_KEY: test
          RAZORPAY_KEY_ID: test
          RAZORPAY_KEY_SECRET: test
          GOOGLE_REFRESH_TOKEN: test
          GOOGLE_USER: test@test.com
          FRONTEND_URL: http://localhost:5173
        run: npm test

  # ── Job 2: Deploy (only if tests passed) ─────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test              # ← waits for test job to succeed
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          curl -X POST "https://api.render.com/deploy/srv-d8sejlgjs32c73d1vtj0?key=FlHU89UQzLQ"
